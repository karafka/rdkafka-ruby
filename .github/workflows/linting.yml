# Linting workflow
#
# This workflow runs linting tools that don't require any external dependencies
# like Kafka. These checks are fast and should block PRs if they fail.
#
# YARD-LINT:
# - Validates YARD documentation syntax and completeness
# - Ensures all public methods have proper parameter and return documentation
# - Catches documentation errors before they reach the codebase

name: Linting

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

permissions:
  contents: read

env:
  BUNDLE_RETRY: 6
  BUNDLE_JOBS: 4

jobs:
  rubocop:
    name: RuboCop (StandardRB)
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: Gemfile.lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: '4.0.5'
          bundler-cache: true

      - name: Run rubocop
        run: bundle exec rubocop

  yard_lint:
    name: YARD Documentation Lint
    runs-on: ubuntu-latest
    env:
      BUNDLE_GEMFILE: Gemfile.lint
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Ruby
        uses: ruby/setup-ruby@8e41b362d2589a22a44c1cfa214b3c83052c195b # v1.318.0
        with:
          ruby-version: '4.0.5'
          bundler-cache: true

      - name: Run yard-lint
        run: bundle exec yard-lint lib

  lostconf:
    name: Config Files Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lostconf
        run: npx lostconf --fail-on-stale

  ci-success:
    name: Linting Success
    runs-on: ubuntu-latest
    if: always()
    needs:
      - rubocop
      - yard_lint
      - lostconf
    steps:
      - name: Check all jobs passed
        if: |
          contains(needs.*.result, 'failure') ||
          contains(needs.*.result, 'cancelled') ||
          contains(needs.*.result, 'skipped')
        run: exit 1
      - run: echo "All linting checks passed!"
