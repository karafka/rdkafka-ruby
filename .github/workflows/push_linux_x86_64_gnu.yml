name: Push Linux x86_64 GNU Platform Gem

on:
  push:
    tags:
      - v*

permissions:
  contents: read

env:
  BUNDLE_RETRY: 6
  BUNDLE_JOBS: 4

jobs:
  push:
    if: github.repository_owner == 'karafka'
    timeout-minutes: 30
    # Same as CI, we build on the oldest possible for ABI compatibility
    runs-on: ubuntu-22.04 # renovate: ignore
    environment: deployment
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Vendor the attestation patch from rubygems/release-gem (no action execution)
      - name: Vendor release-gem patch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: rubygems/release-gem
          ref: a25424ba2ba8b387abc8ef40807c2c85b96cbe32 # v1.1.1
          path: .github/_release-gem
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            gcc \
            make \
            patch \
            tar \
            wget \
            ca-certificates \
            libsasl2-dev \
            libssl-dev \
            zlib1g-dev \
            libzstd-dev

      - name: Cache build-tmp directory
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ext/build-tmp
          key: build-tmp-${{ runner.os }}-${{ hashFiles('ext/*.sh') }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@97ecb7b512899eb71ab1bf2310a624c6f1589ac6 # v1.308.0
        with:
          ruby-version: '4.0.4'
          bundler-cache: false

      - name: Build precompiled librdkafka.so
        run: |
          cd ext
          ./build_linux_x86_64_gnu.sh

      - name: Configure trusted publishing credentials
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa # v2.0.0

      - name: Build and push platform-specific gem (with Sigstore attestation)
        env:
          RUBY_PLATFORM: 'x86_64-linux-gnu'
          # Preload the attestation patch so `gem push` generates & attaches the bundle
          RUBYOPT: "-r${{ github.workspace }}/.github/_release-gem/rubygems-attestation-patch.rb"
        run: |
          gem build *.gemspec
          gem push *.gem
